# Site Configuration
baseURL: https://blog.ibnbaqi.com/
languageCode: en-us
title: Abdulbaki's Blog
theme: ["PaperMod"]

# Output Formats
outputs:
  home: ['html', 'rss', 'json']
  section: ['html', 'rss']
  taxonomy: ['html']
  term: ['html']

caches:
  images:
    dir: :cacheDir/images

enableRobotsTXT: true
# buildDrafts: false
# buildFuture: false
# buildExpired: false


# Site parameters
params:
  mainSections: ["blog"]
  env: production
  # title: Your Blog Title
  # description: "Your blog description here"
  keywords: [Blog, Portfolio, PaperMod]
  author: Salaudeen Abdulbaki
  # author: ["Me", "You"] # multiple authors
  images: ["<link or path of image for opengraph, twitter-cards>"]
  DateFormat: "January 2, 2006"
  defaultTheme: auto # dark, light
  # disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false

  # assets:
  #   # disableHLJS: true # to disable highlight.js
  #   # disableFingerprinting: true
  #   favicon: "<link / abs url>"
  #   favicon16x16: "<link / abs url>"
  #   favicon32x32: "<link / abs url>"
  #   apple_touch_icon: "<link / abs url>"
  #   safari_pinned_tab: "<link / abs url>"

  # profile-mode
  profileMode:
    enabled: false
    title: Salaudeen Abdullbaki
    subtitle: "Backend Software Engineer"
    imageUrl: "<img location>"
    imageWidth: 120
    imageHeight: 120
    imageTitle: my image
    buttons:
      - name: Posts
        url: posts
      - name: Tags
        url: tags

  # Home Page Information
  homeInfoParams:
    Title: "{{< terminal-prompt >}}"
    Content: "### Hey! I'm Abdulbaki\n Welcome to my corner of the internet. This website is a personal blog which I use as a platform to document my learning journey and showcase it for the world to see."

  socialIcons:
    - name: github
      url: "https://github.com/IbnBaqqi"
    - name: email
      url: "mailto:salausmart132@gmail.com"
    - name: X
      url: "https://x.com/Salau_smart"
    - name: linkedin
      url: "https://linkedin.com/in/abdulbaki-salaudeen"

  cover:
    hidden: true # hide everywhere but not in structured data
    hiddenInList: true # hide on list pages and home
    hiddenInSingle: true # hide on single page

  # Search settings
  # https://fusejs.io/api/options.html
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: home
      name: Home
      url: /
      weight: 1
    - identifier: about
      name: About
      url: /about/
      weight: 2
    - identifier: blog
      name: Blog
      url: /blog/
      weight: 3
    - identifier: shelf
      name: Shelf
      url: /shelf/
      weight: 4
    - identifier: search
      name: Search
      url: /search/
      weight: 5
    # - identifier: archive
    #   name: Archives
    #   url: /archive/
    # - identifier: tags
    #   name: Tags
    #   url: /tags/
    #   weight: 4
    # - identifier: categories
    #   name: Categories
    #   url: /categories/
    #   weight: 5


# Markup and Syntax Highlighting Settings
markup:
  highlight:
  codeFences: true
  guessSyntax: true
  lineNos: false
  noClasses: false